<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Videojuegos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS File -->
    <link href="resources/static/styles.css" rel="stylesheet">
</head>
<body>

<tbody>

<tr th:each="videojuego : ${videojuegos}">
    <td th:text="${videojuego.id}"></td>
    <td>
        <img th:src="${videojuego.rutaimg}"
             class="game-img"
             th:alt="${videojuego.nombre}">
        <span th:text="${videojuego.nombre}"></span>
    </td>
    <td th:text="'$' + ${#numbers.formatDecimal(videojuego.precio, 0, 'POINT', 2, 'COMMA')}"></td>
    <td th:text="${videojuego.cantidad}"></td>
    <td>
                          <span th:classappend="${videojuego.oferta} ? 'bg-warning text-dark' : 'bg-secondary'"
                                class="badge"
                                th:text="${videojuego.oferta} ? 'Sí' : 'No'"></span>
    </td>
    <td th:text="${videojuego.estudio != null ? videojuego.estudio.nombre : '—'}"></td>
    <td th:text="${videojuego.categoria != null ? videojuego.categoria.nombre : '—'}"></td>
    <td th:text="${videojuego.activo ? 'Sí' : 'No'}"></td>
    <td>
        Botón Eliminar
        <a th:href="@{'/videojuegos/eliminar/' + ${videojuego.id}}"
           class="btn btn-sm btn-danger">Eliminar</a>
    </td>
</tr>

</tbody>

<footer th:insert="components/footer :: pie-pagina"></footer>

</body>
</html>
